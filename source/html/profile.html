<head>
    <style>
        #upload_pfp{ display: none; }
        #upload_pfp:target{ display: block; }

        #edit_username{ display: none; }
        #edit_username:target{ display: block; }
    </style>
</head>
<body>
    <!-- Logo block -->
    <a href="/" style="text-decoration: none; display: inline-block; width: 190px; height: 64px;">
        <img src="favicon.ico" style="position: relative; width: 64px; height: 64px; image-rendering: pixelated;">
        <p style="position: relative; left: 70px; top: -82px; font-size: 32px; color: black;">RVIDEO</p>
    </a>

    <!-- Logout block -->
    <a href="login?out" style="text-decoration: none; display: inline-block; position: fixed; right: 12px;">
        <p style="font-size: 24px; margin: 0%; color: black;">Logout</p>
    </a>

    <div style="max-width: fit-content; margin-left: auto; margin-right: auto;">
        <div>
            <a href="/profile#edit_username" style="text-decoration: none;" >
                <p style="text-align: center; position: relative; right: 27%; color: black;">$USERNAME</p>
            </a>
            <form action="/profile?edit" method="post" id="edit_username">
                <input type="text" name="username">
                <input type="hidden" name="token" value="$TOKEN">
                <input type="submit" value="change">
            </form>
            <a href="/profile#upload_pfp" >
                <img src="profile?pfp=$PID" style="width: 128px; height: 128px;">
            </a>
            <form action="/profile?upload" method="post" enctype="multipart/form-data" id="upload_pfp" style="position: relative; right: 30%;">
                <input type="file" name="picture">
                <input type="hidden" name="token" value="$TOKEN">
                <input type="submit" value="upload">
            </form>
            
            [SUCCESS 
            <p style="position: relative; right: 20%; color: green;">Profile picture updated successfuly</p>
            ]

            [NO_SELECTED 
            <p style="position: relative; right: 20%; color: red;">No File selected</p>
            ]

            [NO_SUPPORT
            <p style="position: relative; right: 20%; color: red;">File type is not supported!</p>
            <p style="position: relative; right: 20%; color: red;">Supported types are png, jpg, ico, and bmp.</p>
            ]

            [TOO_LARGE 
            <p style="position: relative; right: 20%; color: red;">File is too large maximun size is 1Mb</p>
            ]
        </div>
    </div>

    <div style="display: grid; grid-template-columns: 100% 100% 100% 100% 100%; grid-template-rows: 50% 50% 50% 50% 50%; max-width: fit-content; margin-left: 5%; margin-right: auto; margin-top: 5%; width: 50%; height: 50%;">$VIDEOS</div>
</body>
