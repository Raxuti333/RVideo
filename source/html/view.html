<body>
    <!-- Logo block -->
    <a href="/" style="text-decoration: none; display: inline-block; width: 190px; height: 64px;">
        <img src="favicon.ico" style="position: relative; width: 64px; height: 64px; image-rendering: pixelated;">
        <p style="position: relative; left: 70px; top: -82px; font-size: 32px; color: black;">RVIDEO</p>
    </a>

    [LOGIN
    <!-- Login block  -->
    <a href="login" style="text-decoration: none; display: inline-block; position: fixed; right: 12px;">
        <p style="font-size: 24px; margin: 0%; color: black;">Login</p>
    </a>
    ]

    [PROFILE
    <a href="video" style="text-decoration: none; display: inline-block; position: fixed; right: 90px; top: 20px;">
        <p style="color: black;">Upload</p>
    </a>
    
    <!--- Profile block -->
    <a href="profile" style="text-decoration: none; display: inline-block; position: fixed; right: 12px;">
        <img src="profile?pfp=$PID" style="width: 64px; height: 64px;">
        <p style="color: black; margin-top: 0px; position: relative; text-align: center;">$USERNAME</p>
    </a>
    ]

    <div style="margin: 1%;">
        <div style="width: 70%; height: 70%;">
            <video controls width="auto" height="100%">
                <source src="video?download=$VID">
            </video>
        </div>
        <div style="margin-top: 1%;">
            <a href="/" style="text-decoration: none; display: inline-block; position: relative; left: 0%;">
                <img src="profile?pfp=$AUTH_PID" style="width: 64px; height: 64px;">
                <p style="color: black; margin-top: 0px; position: relative; text-align: center;">$AUTH_USERNAME</p>
            </a>
            <p style="display: inline-block; position: relative; margin-top: -5%; font-size: larger;">$TITLE</p>

            [OWNER 
            <a href="video?edit=$VID">
                <button>edit</button>
            </a>
            ]

            <p style="display: block; position: relative;">$DESCRIPTION</p>
        </div>
    </div>
